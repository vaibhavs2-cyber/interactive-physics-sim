<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Physics Simulator</title>
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <header>
      <h2>Physics Simulator</h2>
      <nav>
        <button id="btn-projectile">Projectile</button>
        <button id="btn-oscillator">Oscillator</button>
        <button id="btn-orbit">Orbit</button>
        <button id="btn-doubleslit">Double-Slit</button>
      </nav>
    </header>
    
    <main id="simulation-container" style="display: flex; flex: 1; overflow: hidden; width: 100vw;">
      
      <div style="flex: 3; display: flex; position: relative;">
        <canvas id="physics-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000;"></canvas>
      </div>
      
      <aside id="readout-panel" style="flex: 1; min-width: 300px; max-width: 350px; padding: 1.5rem; border-left: 2px solid #333; display: flex; flex-direction: column; gap: 15px; background: #121212; z-index: 10;">
        <h3>Controls</h3>
        
        <div class="control-group">
          <label>Velocity: <span id="vel-display">70</span> m/s</label>
          <input type="range" id="velocity-slider" min="10" max="150" value="70" style="width: 100%;">
        </div>

        <div class="control-group">
          <label>Angle: <span id="angle-display">60</span>°</label>
          <input type="range" id="angle-slider" min="0" max="90" value="60" style="width: 100%;">
        </div>

        <button id="fire-btn" style="padding: 10px; background: #ff4757; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Fire Projectile</button>
        
        <h3 style="margin-top: 20px;">Live State</h3>
        <div id="data-readout" style="font-family: monospace; background: #222; padding: 15px; border-radius: 4px; line-height: 1.5;">
          Time: 0.00 s<br>
          Height (y): 0.00 m<br>
          Range (x): 0.00 m
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
